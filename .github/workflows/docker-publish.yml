name: Build and push Docker images

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.versions.outputs.versions }}
      latest: ${{ steps.versions.outputs.latest }}
    steps:
      - uses: docker/setup-buildx-action@v3

      - id: versions
        run: |
          set -euo pipefail
          VERSIONS_JSON=$(npm view playwright-core versions --json)
          STABLE=$(echo "$VERSIONS_JSON" | jq -r '.[] | select(test("^[0-9]+[.][0-9]+[.][0-9]+$"))')

          can_build_from_image() {
            local image="$1"
            local tmpdir
            local status
            tmpdir="$(mktemp -d)"
            printf 'FROM %s\n' "$image" > "${tmpdir}/Dockerfile"
            docker buildx build \
              --pull \
              --platform linux/amd64,linux/arm64 \
              --progress=plain \
              "${tmpdir}"
            status=$?
            rm -rf "${tmpdir}"
            return "${status}"
          }

          SELECTED=()
          SEEN_MINORS=""
          while IFS= read -r VERSION; do
            MINOR="${VERSION%.*}"
            if [[ " ${SEEN_MINORS} " == *" ${MINOR} "* ]]; then
              continue
            fi

            IMAGE="mcr.microsoft.com/playwright:v${VERSION}-noble"
            echo "Checking ${IMAGE}"
            if can_build_from_image "${IMAGE}" >/dev/null 2>&1; then
              SELECTED+=("${VERSION}")
              SEEN_MINORS="${SEEN_MINORS} ${MINOR}"
              echo "Selected ${VERSION} for minor ${MINOR}"
            else
              echo "Skipping ${VERSION}: BuildKit cannot resolve ${IMAGE}"
            fi

            if [ "${#SELECTED[@]}" -eq 2 ]; then
              break
            fi
          done < <(echo "$STABLE" | sort -Vr)

          if [ "${#SELECTED[@]}" -lt 2 ]; then
            echo "Could not find two Playwright versions with available mcr.microsoft.com/playwright:* -noble images" >&2
            exit 1
          fi

          LATEST="${SELECTED[0]}"
          PREV="${SELECTED[1]}"
          ARR=$(jq -nc --arg l "$LATEST" --arg p "$PREV" '[$l, $p]')
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "versions=$ARR" >> "$GITHUB_OUTPUT"
          echo "Will build: latest=$LATEST, previous=$PREV"

  build-and-push:
    needs: [discover, smoke-test]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: playwright-chromium
            dockerfile: playwright-chromium/Dockerfile
            headless: false
            platforms: linux/amd64,linux/arm64
          - name: playwright-firefox
            dockerfile: playwright-firefox/Dockerfile
            headless: false
            platforms: linux/amd64,linux/arm64
          - name: playwright-webkit
            dockerfile: playwright-webkit/Dockerfile
            headless: false
            platforms: linux/amd64,linux/arm64
          - name: playwright-chrome
            dockerfile: playwright-chrome/Dockerfile
            headless: false
            platforms: linux/amd64
          - name: playwright-msedge
            dockerfile: playwright-msedge/Dockerfile
            headless: false
            platforms: linux/amd64
          - name: playwright-chromium
            dockerfile: playwright-chromium/Dockerfile.headless
            headless: true
            platforms: linux/amd64,linux/arm64
          - name: playwright-firefox
            dockerfile: playwright-firefox/Dockerfile.headless
            headless: true
            platforms: linux/amd64,linux/arm64
          - name: playwright-webkit
            dockerfile: playwright-webkit/Dockerfile.headless
            headless: true
            platforms: linux/amd64,linux/arm64
          - name: playwright-chrome
            dockerfile: playwright-chrome/Dockerfile.headless
            headless: true
            platforms: linux/amd64
          - name: playwright-msedge
            dockerfile: playwright-msedge/Dockerfile.headless
            headless: true
            platforms: linux/amd64
        version: ${{ fromJson(needs.discover.outputs.versions) }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: build-meta
        run: echo "created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - id: tags
        env:
          IMAGE: selenwright/${{ matrix.image.name }}
          VERSION: ${{ matrix.version }}
          LATEST: ${{ needs.discover.outputs.latest }}
          HEADLESS: ${{ matrix.image.headless }}
        run: |
          set -euo pipefail
          SUFFIX=""
          if [ "${HEADLESS}" = "true" ]; then SUFFIX="-headless"; fi
          MINOR="${VERSION%.*}"
          TAGS="${IMAGE}:${VERSION}${SUFFIX},${IMAGE}:${MINOR}${SUFFIX}"
          if [ "${VERSION}" = "${LATEST}" ]; then
            TAGS="${TAGS},${IMAGE}:latest${SUFFIX},${IMAGE}:latest-release${SUFFIX}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: ${{ matrix.image.platforms }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            PLAYWRIGHT_VERSION=${{ matrix.version }}
            BUILD_DATE=${{ steps.build-meta.outputs.created }}
            VCS_REF=${{ github.sha }}

  smoke-test:
    needs: discover
    runs-on: ${{ matrix.image.runner }}
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: playwright-chromium
            dockerfile: playwright-chromium/Dockerfile
            headless: false
            browser: chromium
            platform: linux/amd64
            platform_slug: linux-amd64
            runner: ubuntu-latest
          - name: playwright-chromium
            dockerfile: playwright-chromium/Dockerfile
            headless: false
            browser: chromium
            platform: linux/arm64
            platform_slug: linux-arm64
            runner: ubuntu-24.04-arm
          - name: playwright-firefox
            dockerfile: playwright-firefox/Dockerfile
            headless: false
            browser: firefox
            platform: linux/amd64
            platform_slug: linux-amd64
            runner: ubuntu-latest
          - name: playwright-firefox
            dockerfile: playwright-firefox/Dockerfile
            headless: false
            browser: firefox
            platform: linux/arm64
            platform_slug: linux-arm64
            runner: ubuntu-24.04-arm
          - name: playwright-webkit
            dockerfile: playwright-webkit/Dockerfile
            headless: false
            browser: webkit
            platform: linux/amd64
            platform_slug: linux-amd64
            runner: ubuntu-latest
          - name: playwright-webkit
            dockerfile: playwright-webkit/Dockerfile
            headless: false
            browser: webkit
            platform: linux/arm64
            platform_slug: linux-arm64
            runner: ubuntu-24.04-arm
          - name: playwright-chrome
            dockerfile: playwright-chrome/Dockerfile
            headless: false
            browser: chromium
            platform: linux/amd64
            platform_slug: linux-amd64
            runner: ubuntu-latest
          - name: playwright-msedge
            dockerfile: playwright-msedge/Dockerfile
            headless: false
            browser: chromium
            platform: linux/amd64
            platform_slug: linux-amd64
            runner: ubuntu-latest
          - name: playwright-chromium
            dockerfile: playwright-chromium/Dockerfile.headless
            headless: true
            browser: chromium
            platform: linux/amd64
            platform_slug: linux-amd64-headless
            runner: ubuntu-latest
          - name: playwright-firefox
            dockerfile: playwright-firefox/Dockerfile.headless
            headless: true
            browser: firefox
            platform: linux/amd64
            platform_slug: linux-amd64-headless
            runner: ubuntu-latest
          - name: playwright-webkit
            dockerfile: playwright-webkit/Dockerfile.headless
            headless: true
            browser: webkit
            platform: linux/amd64
            platform_slug: linux-amd64-headless
            runner: ubuntu-latest
          - name: playwright-chrome
            dockerfile: playwright-chrome/Dockerfile.headless
            headless: true
            browser: chromium
            platform: linux/amd64
            platform_slug: linux-amd64-headless
            runner: ubuntu-latest
          - name: playwright-msedge
            dockerfile: playwright-msedge/Dockerfile.headless
            headless: true
            browser: chromium
            platform: linux/amd64
            platform_slug: linux-amd64-headless
            runner: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - id: build-meta
        run: echo "created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: ${{ matrix.image.platform }}
          load: true
          tags: selenwright-smoke/${{ matrix.image.name }}:${{ matrix.image.platform_slug }}
          build-args: |
            PLAYWRIGHT_VERSION=${{ needs.discover.outputs.latest }}
            BUILD_DATE=${{ steps.build-meta.outputs.created }}
            VCS_REF=${{ github.sha }}

      - name: Run smoke test
        env:
          BROWSER_TYPE: ${{ matrix.image.browser }}
          IMAGE: selenwright-smoke/${{ matrix.image.name }}:${{ matrix.image.platform_slug }}
          PLATFORM: ${{ matrix.image.platform }}
          VERSION: ${{ needs.discover.outputs.latest }}
          HEADLESS: ${{ matrix.image.headless }}
        run: |
          set -euo pipefail

          npm install --no-save --no-package-lock "playwright-core@${VERSION}"

          EXTRA_PORTS=""
          if [ "${HEADLESS}" != "true" ]; then
            EXTRA_PORTS="-p 127.0.0.1:9090:9090"
          fi

          docker run -d --name selenwright-smoke \
            --platform "${PLATFORM}" \
            -p 127.0.0.1:3000:3000 \
            ${EXTRA_PORTS} \
            -e PW_HEADLESS=true \
            -e ENABLE_VNC=false \
            "${IMAGE}"
          trap 'docker logs selenwright-smoke || true; docker exec selenwright-smoke sh -lc "cat /tmp/clipboard.log /tmp/fluxbox.log /tmp/x11vnc.log /tmp/capture.log 2>/dev/null || true" || true; docker rm -f selenwright-smoke || true' EXIT

          for attempt in $(seq 1 60); do
            status=$(docker inspect --format '{{.State.Health.Status}}' selenwright-smoke 2>/dev/null || true)
            if [ "$status" = "healthy" ]; then
              break
            fi
            sleep 1
          done

          status=$(docker inspect --format '{{.State.Health.Status}}' selenwright-smoke)
          test "$status" = "healthy"

          if [ "${HEADLESS}" != "true" ]; then
            clipboard_ready=false
            for attempt in $(seq 1 30); do
              if printf 'selenwright-smoke' | curl -fsS -X POST --data-binary @- http://127.0.0.1:9090/ >/dev/null 2>&1 \
                && [ "$(curl -fsS http://127.0.0.1:9090/ 2>/dev/null)" = "selenwright-smoke" ]; then
                clipboard_ready=true
                break
              fi
              sleep 1
            done
            test "$clipboard_ready" = "true"
          fi

          node - <<'NODE'
          const { chromium, firefox, webkit } = require("playwright-core");
          const browsers = { chromium, firefox, webkit };
          const browserType = browsers[process.env.BROWSER_TYPE];
          if (!browserType) {
            throw new Error(`Unsupported browser type: ${process.env.BROWSER_TYPE}`);
          }

          (async () => {
            const browser = await browserType.connect("ws://127.0.0.1:3000/");
            const page = await browser.newPage();
            await page.setContent("<title>selenwright smoke</title><h1>ok</h1>");
            const title = await page.title();
            await browser.close();
            if (title !== "selenwright smoke") {
              throw new Error(`Unexpected page title: ${title}`);
            }
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

  cleanup:
    needs: [discover, build-and-push]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - playwright-chromium
          - playwright-firefox
          - playwright-webkit
          - playwright-chrome
          - playwright-msedge
    steps:
      - name: Prune old tags from Docker Hub
        env:
          USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          NAMESPACE: selenwright
          REPO: ${{ matrix.image }}
          VERSIONS: ${{ needs.discover.outputs.versions }}
        run: |
          set -euo pipefail

          KEEP_FULL_VERSIONS=$(echo "$VERSIONS" | jq -r '.[]')
          if [ -z "$KEEP_FULL_VERSIONS" ]; then
            echo "Keep set is empty — aborting to avoid wiping the repo"
            exit 1
          fi
          KEEP_MINORS=$(echo "$KEEP_FULL_VERSIONS" | awk -F. '{print $1"."$2}')
          KEEP_HEADLESS=$(printf '%s\n%s\nlatest-headless\nlatest-release-headless\n' \
            "$(echo "$KEEP_FULL_VERSIONS" | sed 's/$/-headless/')" \
            "$(echo "$KEEP_MINORS" | sed 's/$/-headless/')")
          KEEP=$(printf '%s\n%s\nlatest\nlatest-release\n%s\n' \
            "$KEEP_FULL_VERSIONS" "$KEEP_MINORS" "$KEEP_HEADLESS" | sort -u)
          echo "Keeping:"
          echo "$KEEP" | sed 's/^/  /'

          JWT=$(curl -fsS -X POST -H "Content-Type: application/json" \
            -d "{\"username\":\"${USERNAME}\",\"password\":\"${TOKEN}\"}" \
            https://hub.docker.com/v2/users/login/ | jq -r .token)
          if [ -z "$JWT" ] || [ "$JWT" = "null" ]; then
            echo "Failed to authenticate with Docker Hub"
            exit 1
          fi

          URL="https://hub.docker.com/v2/repositories/${NAMESPACE}/${REPO}/tags/?page_size=100"
          ALL_TAGS=""
          while [ -n "$URL" ] && [ "$URL" != "null" ]; do
            RESP=$(curl -fsS -H "Authorization: JWT ${JWT}" "$URL")
            PAGE_TAGS=$(echo "$RESP" | jq -r '.results[].name')
            ALL_TAGS="${ALL_TAGS}${PAGE_TAGS}"$'\n'
            URL=$(echo "$RESP" | jq -r '.next')
          done

          MANAGED_TAG_PATTERN='^([0-9]+[.][0-9]+([.][0-9]+)?|latest|latest-release)(-headless)?$'

          echo "$ALL_TAGS" | grep -v '^$' | sort -u | while read -r TAG; do
            if echo "$KEEP" | grep -qx "$TAG"; then
              echo "keep   $TAG"
            elif ! echo "$TAG" | grep -Eq "$MANAGED_TAG_PATTERN"; then
              echo "skip   $TAG (unmanaged)"
            else
              CODE=$(curl -s -o /dev/null -w '%{http_code}' \
                -X DELETE -H "Authorization: JWT ${JWT}" \
                "https://hub.docker.com/v2/repositories/${NAMESPACE}/${REPO}/tags/${TAG}/")
              echo "delete $TAG (HTTP $CODE)"
            fi
          done
